<!DOCTYPE html>
<html class="dark" lang="tr">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>Şifremi Unuttum - Match Parts</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet"/>
    <script src="https://cdn.tailwindcss.com?plugins=forms,typography"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: { primary: "#16a3b2", "background-dark": "#0d1117" },
                    fontFamily: { display: ["Poppins", "sans-serif"] },
                },
            },
        };
    </script>
    <style>
        body { min-height: 100vh; }
        #bg-video { position: fixed; right: 0; bottom: 0; min-width: 100%; min-height: 100%; z-index: -100; object-fit: cover; opacity: 0.1; }
        .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24 }
        
        /* SweetAlert Özelleştirmesi (Karanlık Mod) */
        div:where(.swal2-container) div:where(.swal2-popup) {
            background: #1f2937 !important;
            color: #e5e7eb !important;
            border: 1px solid #374151;
        }
    </style>
</head>

<body class="bg-background-dark font-display text-gray-300 transition-default overflow-hidden">
    <video autoplay="" id="bg-video" loop="" muted="" playsinline="">
        <source src="Assets/Videos/video1.mp4" type="video/mp4"/>
    </video>

    <a class="absolute top-4 left-4 z-20 w-12 h-12 rounded-full bg-black/30 backdrop-blur-md border border-white/20 flex items-center justify-center text-white hover:bg-black/50 transition-colors" href="anasayfa.html">
        <span class="material-symbols-outlined text-xl"> home </span>
    </a>

    <div class="relative min-h-screen flex items-center justify-center p-4 lg:p-8">
        <div class="absolute inset-0 bg-black/30 backdrop-blur-sm"></div>
        <div class="relative w-full max-w-md p-6 sm:p-8 bg-gray-900/90 rounded-lg shadow-2xl">
            <header class="text-center mb-6">
                <h1 class="text-2xl font-bold text-white">Şifreni Sıfırla</h1>
                <p class="text-gray-400 mt-1">Hesabınıza bağlı e-posta adresini girin.</p>
            </header>
            <main>
                <form id="forgotPasswordForm" class="space-y-4">
                    <div>
                        <label class="block text-sm font-medium text-gray-300 mb-1" for="email">Email</label>
                        <input class="w-full bg-gray-800 border-gray-700 rounded-md focus:ring-primary focus:border-primary text-white placeholder:text-gray-500 transition-default" 
                               id="email" name="email" placeholder="sen@example.com" type="email" required/>
                    </div>
                    <button id="submitButton" class="w-full bg-primary text-white font-semibold py-3 px-6 rounded-lg shadow-lg flex items-center justify-center gap-2 mt-2 hover:bg-primary/90 transition-colors" type="submit">
                        Sıfırlama Bağlantısı Gönder
                    </button>
                </form>
            </main>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', function() {
            const form = document.getElementById('forgotPasswordForm');
            const submitButton = document.getElementById('submitButton');

            form.addEventListener('submit', async function(e) {
                e.preventDefault();
                
                const email = document.getElementById('email').value;
                const originalBtnText = submitButton.innerHTML;
                
                // Butonu kilitle
                submitButton.disabled = true;
                submitButton.textContent = 'Gönderiliyor...';

                try {
                    const response = await fetch('https://pcpartsbuild.com/api/auth/forgot-password', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ email: email })
                    });

                    let result;
                    const contentType = response.headers.get("content-type");
                    if (contentType && contentType.indexOf("application/json") !== -1) {
                        result = await response.json();
                    } else {
                        result = { message: await response.text() };
                    }

                    if (response.ok) {
                        // --- BAŞARILI (SweetAlert) ---
                        Swal.fire({
                            title: 'Link Gönderildi!',
                            text: 'Sıfırlama bağlantısı e-posta adresinize gönderildi. Lütfen kutunuzu kontrol edin.',
                            icon: 'success',
                            background: '#1f2937',
                            color: '#fff',
                            confirmButtonColor: '#16a3b2'
                        });
                        submitButton.disabled = false;
                        submitButton.innerHTML = originalBtnText;
                    } else {
                        // --- HATA (SweetAlert) ---
                        Swal.fire({
                            title: 'Hata',
                            text: result.message || 'Bir hata oluştu.',
                            icon: 'error',
                            background: '#1f2937',
                            color: '#fff',
                            confirmButtonColor: '#d33'
                        });
                        submitButton.disabled = false;
                        submitButton.innerHTML = originalBtnText;
                    }
                } catch (error) {
                    console.error('Hata:', error);
                    // --- SUNUCU HATASI (SweetAlert) ---
                    Swal.fire({
                        title: 'Bağlantı Hatası',
                        text: 'Sunucuya bağlanılamadı. İnternet bağlantınızı kontrol edin.',
                        icon: 'error',
                        background: '#1f2937',
                        color: '#fff',
                        confirmButtonColor: '#d33'
                    });
                    submitButton.disabled = false;
                    submitButton.innerHTML = originalBtnText;
                }
            });
        });
    </script>
</body>
</html>
